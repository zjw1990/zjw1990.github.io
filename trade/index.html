<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trade — coming soon">
    <title>Trade — Jiawei Zhao</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 50%);
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 640px;
        }

        .badge {
            display: inline-block;
            padding: 0.35rem 1rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-glow);
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.15;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #f1f5f9 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: var(--accent);
            margin: 2rem auto;
            border-radius: 1px;
            opacity: 0.5;
        }

        .ticker-table {
            width: 100%;
            max-width: 420px;
            margin: 0 auto 2rem;
            border-collapse: collapse;
        }

        .ticker-table th,
        .ticker-table td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .ticker-table th {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .ticker-table .symbol {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .ticker-table .price {
            font-weight: 600;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .ticker-table .change {
            text-align: right;
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
        }

        .change.up { color: #34d399; }
        .change.down { color: #f87171; }
        .change.neutral { color: var(--text-muted); }

        .ticker-table .spark {
            width: 60px;
            height: 28px;
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">Coming Soon</span>
        <h1>Trade</h1>
        <p>
            Exploring quantitative trading, market data analysis, and algorithmic
            strategies — built with clarity and rigour.
        </p>

        <table class="ticker-table">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Price</th>
                    <th>Change</th>
                </tr>
            </thead>
            <tbody>
                <tr id="row-NVDA">
                    <td class="symbol">NVDA</td>
                    <td class="price" id="price-NVDA">—</td>
                    <td class="change" id="change-NVDA">—</td>
                </tr>
                <tr id="row-MU">
                    <td class="symbol">MU</td>
                    <td class="price" id="price-MU">—</td>
                    <td class="change" id="change-MU">—</td>
                </tr>
                <tr id="row-VOO">
                    <td class="symbol">VOO</td>
                    <td class="price" id="price-VOO">—</td>
                    <td class="change" id="change-VOO">—</td>
                </tr>
                <tr id="row-QQQ">
                    <td class="symbol">QQQ</td>
                    <td class="price" id="price-QQQ">—</td>
                    <td class="change" id="change-QQQ">—</td>
                </tr>
            </tbody>
        </table>
        <p class="loading-text" id="updated">Loading prices…</p>

        <div class="divider"></div>
        <footer>
            &copy; 2026 Jiawei Zhao
        </footer>
    </div>

    <script>
    (async () => {
        const symbols = ['NVDA', 'MU', 'VOO', 'QQQ'];

        try {
            const url = 'https://query1.finance.yahoo.com/v7/finance/quote?symbols=' + symbols.join(',');
            const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
            const data = await res.json();
            const results = data.quoteResponse.result;

            for (const r of results) {
                const sym = r.symbol;
                const price = r.regularMarketPrice;
                const prev = r.regularMarketPreviousClose || r.previousClose;
                const change = price - prev;
                const pct = prev ? ((change / prev) * 100) : 0;
                const dir = change > 0 ? 'up' : change < 0 ? 'down' : 'neutral';
                const sign = change > 0 ? '+' : '';

                document.getElementById('price-' + sym).textContent =
                    '$' + price.toFixed(2);
                const cel = document.getElementById('change-' + sym);
                cel.textContent = sign + change.toFixed(2) + ' (' + (pct > 0 ? '+' : '') + pct.toFixed(2) + '%)';
                cel.className = 'change ' + dir;
            }

            const now = new Date();
            document.getElementById('updated').textContent =
                'Updated ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + ' ET';
        } catch (e) {
            document.getElementById('updated').textContent =
                'Prices delayed — refresh to retry.';
            // Show last known prices as fallback
            const fallback = {
                NVDA: { price: 205.10, prev: 218.66 },
                MU: { price: 864.01, prev: 996.00 },
                VOO: { price: 678.00, prev: 696.06 },
                QQQ: { price: 705.06, prev: 740.61 },
            };
            for (const sym of symbols) {
                const fb = fallback[sym];
                document.getElementById('price-' + sym).textContent = '$' + fb.price.toFixed(2);
                const change = fb.price - fb.prev;
                const pct = (change / fb.prev) * 100;
                const dir = change > 0 ? 'up' : change < 0 ? 'down' : 'neutral';
                const sign = change > 0 ? '+' : '';
                const cel = document.getElementById('change-' + sym);
                cel.textContent = sign + change.toFixed(2) + ' (' + (pct > 0 ? '+' : '') + pct.toFixed(2) + '%)';
                cel.className = 'change ' + dir;
            }
        }
    })();
    </script>
</body>
</html>
